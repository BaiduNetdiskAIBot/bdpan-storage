name: Publish to ClawHub

on:
  push:
    tags:
      - '*/v*'
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill 目录名（如 baidu-netdisk）'
        required: true
      version:
        description: '发布版本号（如 1.6.0，不带 v 前缀）'
        required: true

jobs:
  publish:
    if: github.repository == 'baidu-netdisk/bdpan-storage'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Determine skill and version
        id: info
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SKILL="${{ github.event.inputs.skill }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SKILL="${TAG%%/*}"
            VERSION="${TAG#*/v}"
          fi
          echo "skill=${SKILL}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          DISPLAY_NAME=$(grep "^name:" "skills/${SKILL}/SKILL.md" | head -1 | sed 's/name: *//')
          echo "display_name=${DISPLAY_NAME}" >> $GITHUB_OUTPUT

      - name: Publish to ClawHub
        run: |
          SKILL="${{ steps.info.outputs.skill }}"
          VERSION="${{ steps.info.outputs.version }}"
          DISPLAY_NAME="${{ steps.info.outputs.display_name }}"
          echo "📦 发布: ${SKILL} v${VERSION} (${DISPLAY_NAME})"
          npx clawhub publish "skills/${SKILL}" \
            --slug "${SKILL}" \
            --name "${DISPLAY_NAME}" \
            --version "${VERSION}" \
            --changelog "Release v${VERSION}"
        env:
          CLAWHUB_AUTH: ${{ secrets.CLAWHUB_AUTH }}
