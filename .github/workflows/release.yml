name: Release Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/VERSION'  # VERSION 文件变更时触发
  workflow_dispatch:         # 支持手动触发

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史来检查 tag 是否已存在

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat skills/bdpan-storage/VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "📌 版本号: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Tag v${{ steps.version.outputs.version }} 已存在，跳过发布"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag v${{ steps.version.outputs.version }} 不存在，准备发布"
          fi

      - name: Package Skills
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          for skill_path in skills/*/; do
            if [ -d "$skill_path" ]; then
              skill_name=$(basename "$skill_path")
              echo "📦 打包: $skill_name v$VERSION"

              (cd skills && zip -r "../dist/${skill_name}-${VERSION}.zip" "$skill_name" \
                -x "*/.git/*" \
                -x "*/.DS_Store" \
                -x "*/node_modules/*" \
                -x "*/__pycache__/*" \
                -x "*/.env*" \
                -x "*/.idea/*" \
                -x "*/.vscode/*" \
                -x "*/dist/*" \
                -x "*/build/*" \
                -x "*.pyc" \
                -x "*.log" \
                -x "*.tmp")

              echo "✅ 完成: dist/${skill_name}-${VERSION}.zip"
            fi
          done

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Generate Release Notes
        if: steps.check_tag.outputs.exists == 'false'
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## 📦 Skills v${VERSION}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 包含的 Skills:" >> $GITHUB_OUTPUT

          for skill_path in skills/*/; do
            if [ -d "$skill_path" ]; then
              skill_name=$(basename "$skill_path")
              skill_file="${skill_path}/SKILL.md"

              if [ -f "$skill_file" ]; then
                desc=$(grep "^description:" "$skill_file" | head -1 | sed 's/description: //' || echo "暂无描述")
                echo "- **${skill_name}** v${VERSION}: ${desc}" >> $GITHUB_OUTPUT
              else
                echo "- **${skill_name}** v${VERSION}" >> $GITHUB_OUTPUT
              fi
            fi
          done

          echo "" >> $GITHUB_OUTPUT
          echo "### 安装方法:" >> $GITHUB_OUTPUT
          echo '```bash' >> $GITHUB_OUTPUT
          echo "npx skills add https://github.com/BaiduNetdiskAIBot/bdpan-storage@bdpan-storage" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          files: dist/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          echo "## 🎉 Release v${{ steps.version.outputs.version }} 创建成功!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**包含的文件:**" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/*.zip | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
